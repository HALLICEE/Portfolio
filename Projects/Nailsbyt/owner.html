<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nails By T | Owner Dashboard</title>
    <meta
      name="description"
      content="Private owner dashboard for the Nails By T studio."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="owner-page owner-dashboard-page" data-page="owner-dashboard" data-requires-auth="true">
    <div class="section1 owner-shell">
      <header class="owner-header">
        <a class="brand" href="index.html">NAILSBYT</a>
        <div class="owner-header-actions">
          <a class="button-secondary" href="index.html">View public site</a>
          <button class="button-primary" id="ownerLogout" type="button">Log out</button>
        </div>
      </header>

      <main class="owner-main owner-dashboard-main">
        <section class="owner-page-title">
          <h1>Dashboard</h1>
        </section>

        <p class="owner-dashboard-response" id="ownerDashboardResponse" aria-live="polite"></p>

        <section class="owner-workspace">
          <div class="owner-sidebar">
            <aside class="dashboard-panel queue-panel" aria-labelledby="queueTitle">
              <div class="panel-heading">
                <h2 id="queueTitle">Unconfirmed bookings</h2>
              </div>

              <div class="queue-list" id="ownerBookingQueue"></div>
            </aside>

            <aside class="dashboard-panel day-detail-panel" aria-labelledby="dayDetailsTitle">
              <div class="panel-heading">
                <h2 id="dayDetailsTitle">Details</h2>
              </div>

              <div class="day-detail-body" id="ownerDayDetails"></div>
              <button class="settings-button" type="button">Settings</button>
            </aside>
          </div>

          <section class="dashboard-panel calendar-panel-large" aria-labelledby="calendarTitle">
            <div class="owner-calendar-header">
              <h2 id="calendarTitle">Studio schedule</h2>

              <div class="owner-calendar-nav-group" aria-label="Calendar navigation">
                <button class="owner-calendar-nav" id="ownerCalendarPrev" type="button" aria-label="Previous month">←</button>
                <strong class="owner-calendar-month" id="ownerCalendarMonth"></strong>
                <button class="owner-calendar-nav" id="ownerCalendarNext" type="button" aria-label="Next month">→</button>
              </div>
            </div>

            <div class="owner-calendar-weekdays" aria-hidden="true">
              <span>Sun</span>
              <span>Mon</span>
              <span>Tue</span>
              <span>Wed</span>
              <span>Thu</span>
              <span>Fri</span>
              <span>Sat</span>
            </div>

            <div class="owner-calendar-grid" id="ownerCalendarGrid"></div>
          </section>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
