<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nails By T | Owner Login</title>
    <meta
      name="description"
      content="Owner login for the Nails By T studio dashboard."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="owner-page" data-page="owner-login">
    <div class="section1 owner-shell">
      <main class="owner-main">
        <a class="owner-back-link" href="index.html">← Back to main site</a>

        <section class="owner-panel">
          <p class="eyebrow">Owner login</p>
          <h1>Sign in to the studio dashboard.</h1>
          <p>
            Private access for booking updates, confirmed appointments, and
            studio management.
          </p>

          <form class="owner-login-form" id="ownerLoginForm" novalidate>
            <label>
              Password
              <input
                id="ownerPassword"
                type="password"
                name="password"
                placeholder="Enter owner password"
                autocomplete="current-password"
                required
              />
            </label>

            <div class="owner-login-actions">
              <button class="button-primary" type="submit">Open owner page</button>
              <a class="button-secondary" href="index.html">Back to site</a>
            </div>

            <p class="form-response login-response" id="loginResponse" aria-live="polite"></p>
          </form>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
